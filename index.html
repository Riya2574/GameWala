<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Gaming Website</title>
</head>
<body>

   <div class="upperHeader">
    <div class="logo">
        <h1>GameWala</h1>
    </div>
    <div class="searchBar">
        <input type="text" placeholder="Search...">
        <button type="submit">Search</button>
    </div>
    <div class="icons">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-regular fa-user"></i>
    </div>
    </div>



  <div class="lowerHeader">
  <div class="navBar">

    <div class="dropdown">
      <a href="#">Home</a>
      <div class="dropdown-content">
        <a href="#">Latest</a>
        <a href="#">Trending</a>
      </div>
    </div>

    <div class="dropdown">
      <a href="#">PlayStation</a>
      <div class="dropdown-content">
        <a href="#">PS5</a>
        <a href="#">PS4</a>
        <a href="#">Accessories</a>
      </div>
    </div>

    <div class="dropdown">
      <a href="#">Xbox</a>
      <div class="dropdown-content">
        <a href="#">Xbox Series X</a>
        <a href="#">Xbox One</a>
      </div>
    </div>

    <div class="dropdown">
      <a href="#">GameList</a>
      <div class="dropdown-content">
        <a href="#">Action</a>
        <a href="#">Racing</a>
        <a href="#">Adventure</a>
      </div>
    </div>

    <div class="dropdown">
      <a href="#">Retro Gaming</a>
      <div class="dropdown-content">
        <a href="#">NES</a>
        <a href="#">SEGA</a>
      </div>
    </div>

    <div class="dropdown">
      <a href="#">Contact Us</a>
      <div class="dropdown-content">
        <a href="#">Support</a>
        <a href="#">Email</a>
      </div>
    </div>

  </div>
</div>

   <div class="banner">
    <img src="bnner.jpg" alt="Banner Image">
   </div>

   <div class="shortCut"></div>
   <div class="product"></div>
   <div class="footer"></div>
</body>
</html>
