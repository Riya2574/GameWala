<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Wishlist - GameWala</title>
</head>
<body>
  <div class="upperHeader">
    <div class="logo"><h1><a href="index.html">GameWala</a></h1></div>

    <div class="searchBar">
      <input type="text" placeholder="Find your next gaming gear..." />
      <button type="submit">Search</button>
    </div>

    <div class="headerActions">
      <div class="iconBtn">
        <i class="fa-regular fa-heart"></i>
        <span class="badge">0</span>
      </div>
      <div class="iconBtn">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="badge2">0</span>
      </div>
      <div class="userLinks">
        <i class="fa-regular fa-user"></i>
        <div class="auth">
          <a href="#">Log in</a>
          <span class="divider">|</span>
          <a href="#">Sign Up</a>
        </div>
      </div>
    </div>
  </div>

  <div class="lowerHeader">
    <div class="navBar">
      
      <div class="dropdown">

      

  <section class="white-section" style="padding: 60px 24px;">
    <div style="max-width: 1100px; margin: 0 auto;">
      <h1 style="font-size: 2.8rem; margin-bottom: 16px; color: #0a3cff;">Your Wishlist</h1>
      <p style="color: #4b5563; font-size: 1.1rem; margin-bottom: 32px;">Save items for later and move them to your cart when you're ready.</p>
      <div id="wishlistItems"></div>
    </div>
  </section>

  <script src="cart.js"></script>
</body>
</html>
